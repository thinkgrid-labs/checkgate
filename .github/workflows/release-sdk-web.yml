name: Release Web SDK

# Triggered by version tags: v1.2.3
on:
  push:
    tags: ["v*.*.*"]

jobs:
  publish:
    name: Build WASM and publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build WASM (web target)
        working-directory: sdks/web
        run: wasm-pack build --target web --out-name checkgate --out-dir dist --release

      - name: Set version from tag
        working-directory: sdks/web
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          
      - name: Bundle Rust Core
        working-directory: sdks/web
        run: node scripts/bundle-rust.js

      - name: Remove wasm-pack ignore file
        working-directory: sdks/web
        run: rm -f dist/.gitignore

      - name: Validate WASM package integrity
        working-directory: sdks/web
        run: |
          if [ ! -f "dist/checkgate_bg.wasm" ]; then echo "Error: WASM binary missing!"; exit 1; fi
          if [ ! -f "dist/checkgate.js" ]; then echo "Error: JS wrapper missing!"; exit 1; fi
          echo "WASM package integrity verified."

      - name: Publish @checkgate/web
        working-directory: sdks/web
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
