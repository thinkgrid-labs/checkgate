# docker-compose.yml — Checkgate all-in-one
#
# Runs a single container with PostgreSQL + Redis + Checkgate server +
# React dashboard bundled inside. Ideal for demos, CI smoke tests, or
# single-node self-hosted deployments.
#
# Usage:
#   docker compose up -d
#
# The dashboard is available at http://localhost:3000

services:
  checkgate:
    build:
      context: .
      dockerfile: Dockerfile
    image: checkgate:latest
    container_name: checkgate
    ports:
      - "3000:3000"
    environment:
      POSTGRES_USER: checkgate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-checkgate}
      POSTGRES_DB: checkgate
      SDK_KEY: ${SDK_KEY:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - checkgate_pgdata:/var/lib/postgresql/data
      - checkgate_redis:/var/lib/redis
    restart: unless-stopped

volumes:
  checkgate_pgdata:
  checkgate_redis:
