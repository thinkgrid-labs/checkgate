buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.2.1"
    }
}

apply plugin: "com.android.library"

android {
    namespace "com.checkgate.reactnative"
    compileSdk 34

    defaultConfig {
        minSdk 23
        targetSdk 34

        externalNativeBuild {
            cmake {
                cppFlags "-O3 -frtti -fexceptions"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/CMakeLists.txt"
        }
    }

    packagingOptions {
        excludes += [
            "**/libc++_shared.so",
            "**/libjsi.so",
            "**/libfbjni.so"
        ]
    }
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    implementation "com.facebook.react:react-android"
}
