# docker-compose.full.yml — all-in-one single-container variant
#
# Spins up one container that runs PostgreSQL + Redis + Launchgate server +
# the React dashboard. Ideal for demos, CI smoke tests, or single-node
# self-hosted deployments where you don't want to manage external services.
#
# Usage:
#   docker compose -f docker-compose.full.yml up -d
#
# The dashboard is available at http://localhost:3000
# Set SDK_KEY before running in any non-demo environment.

services:
  launchgate:
    build:
      context: .
      dockerfile: Dockerfile.full
    image: launchgate:full
    container_name: launchgate-full
    ports:
      - "3000:3000"
    environment:
      POSTGRES_USER: launchgate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-launchgate}
      POSTGRES_DB: launchgate
      SDK_KEY: ${SDK_KEY:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - launchgate_full_pgdata:/var/lib/postgresql/data
      - launchgate_full_redis:/var/lib/redis
    restart: unless-stopped

volumes:
  launchgate_full_pgdata:
  launchgate_full_redis:
